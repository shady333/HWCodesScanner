<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141414">
<meta name="description" content="Scan, log, and export your Hot Wheels toy number collection.">
<title>Garage Log — Hot Wheels Collection</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<style>
  :root {
    --bg: #121212;
    --bg-panel: #191919;
    --bg-inset: #0d0d0d;
    --orange: #ff6a13;
    --orange-dim: #a84a10;
    --white: #f4f4f2;
    --gray-border: #3a3a3a;
    --gray-text: #8f8f8c;
    --green: #4cd170;
    --red: #ff4d4d;
    --radius: 10px;
  }

  * { box-sizing: border-box; }

  html { background: var(--bg); }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--white);
    font-family: "Helvetica Neue", Arial, sans-serif;
    padding: 0 0 48px 0;
    min-height: 100vh;
  }

  header {
    padding: 28px 20px 18px;
    text-align: center;
    border-bottom: 1px solid var(--gray-border);
    background:
      radial-gradient(120% 140% at 50% -20%, rgba(255,106,19,0.16), transparent 60%),
      var(--bg);
  }

  .wordmark {
    margin: 0;
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 34px;
    letter-spacing: 3px;
    color: var(--white);
    text-transform: uppercase;
  }
  .wordmark span { color: var(--orange); }

  .tagline {
    margin: 6px 0 0;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-text);
  }

  main {
    max-width: 560px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* ---------- Scanner section ---------- */
  .scan-section {
    padding: 22px 0 8px;
  }

  .scan-label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gray-text);
    margin-bottom: 8px;
  }

  .scan-input-wrap {
    position: relative;
  }

  #code-input {
    width: 100%;
    display: block;
    background: var(--bg-inset);
    border: 2px solid var(--gray-border);
    border-radius: var(--radius);
    color: var(--white);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    text-align: center;
    text-transform: uppercase;
    padding: 18px 14px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    -webkit-appearance: none;
  }

  #code-input::placeholder {
    color: #5a5a58;
    letter-spacing: 1px;
    font-weight: 500;
    text-transform: none;
    font-size: 16px;
  }

  #code-input:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(255,106,19,0.22);
  }

  #code-input.flash-success {
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(76,209,112,0.25);
  }

  .scan-hint {
    margin: 10px 2px 0;
    font-size: 12px;
    color: var(--gray-text);
    line-height: 1.5;
  }

  #confirmation-actions {
    display: none;
    gap: 10px;
    margin-top: 12px;
  }
  #confirmation-actions.show {
    display: flex;
  }

  .confirm-btn,
  .clear-btn {
    flex: 1;
    border: none;
    border-radius: var(--radius);
    padding: 14px 12px;
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
  }

  .confirm-btn {
    background: var(--green);
    color: #0d2414;
  }
  .confirm-btn:active { background: #3bb45f; }

  .clear-btn {
    background: var(--bg-inset);
    color: var(--white);
    border: 1px solid var(--gray-border);
  }
  .clear-btn:active { background: #1c1c1c; }

  .toast {
    min-height: 20px;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--green);
    text-align: center;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ---------- Checkered flag divider ---------- */
  .flag-divider {
    height: 16px;
    margin: 22px -16px 18px;
    background-color: #f4f4f2;
    background-image:
      linear-gradient(45deg, #0d0d0d 25%, transparent 25%, transparent 75%, #0d0d0d 75%, #0d0d0d),
      linear-gradient(45deg, #0d0d0d 25%, transparent 25%, transparent 75%, #0d0d0d 75%, #0d0d0d);
    background-size: 16px 16px;
    background-position: 0 0, 8px 8px;
    border-top: 1px solid #000;
    border-bottom: 1px solid #000;
  }

  /* ---------- Collection section ---------- */
  .collection-section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .collection-title {
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin: 0;
  }

  .collection-count {
    font-size: 12px;
    color: var(--gray-text);
    letter-spacing: 1px;
  }

  .empty-state {
    border: 1px dashed var(--gray-border);
    border-radius: var(--radius);
    padding: 30px 16px;
    text-align: center;
    color: var(--gray-text);
    font-size: 14px;
    line-height: 1.6;
  }

  .car-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .car-row {
    background: var(--bg-panel);
    border: 1px solid var(--gray-border);
    border-radius: var(--radius);
    padding: 10px 12px;
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-areas:
      "code qty"
      "meta actions";
    row-gap: 8px;
    align-items: center;
  }

  .car-code {
    grid-area: code;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: 1.5px;
    color: var(--white);
  }

  .car-edit-input {
    grid-area: code;
    background: var(--bg-inset);
    border: 1px solid var(--orange);
    border-radius: 6px;
    color: var(--white);
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 6px 8px;
    width: 120px;
    outline: none;
  }

  .car-meta {
    grid-area: meta;
    font-size: 11px;
    color: var(--gray-text);
    letter-spacing: 0.5px;
  }

  .car-qty {
    grid-area: qty;
    display: flex;
    align-items: center;
    gap: 6px;
    justify-self: end;
  }

  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid var(--gray-border);
    background: var(--bg-inset);
    color: var(--white);
    font-size: 16px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
  }
  .qty-btn:active { background: var(--orange-dim); }

  .qty-value {
    min-width: 22px;
    text-align: center;
    font-weight: 800;
    font-size: 15px;
  }

  .car-actions {
    grid-area: actions;
    justify-self: end;
    display: flex;
    gap: 8px;
  }

  .text-btn {
    background: none;
    border: none;
    color: var(--gray-text);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    padding: 4px 2px;
  }
  .text-btn:hover { color: var(--white); }
  .text-btn.danger:hover { color: var(--red); }
  .text-btn.confirm { color: var(--green); }

  /* ---------- Export ---------- */
  .export-wrap {
    margin-top: 26px;
  }

  .export-btn {
    width: 100%;
    background: var(--orange);
    color: #141414;
    border: none;
    border-radius: var(--radius);
    padding: 15px 12px;
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .export-btn:active { background: var(--orange-dim); }
  .export-btn:disabled {
    background: var(--gray-border);
    color: var(--gray-text);
    cursor: not-allowed;
  }

  .clear-all-btn {
    width: 100%;
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    border-radius: var(--radius);
    padding: 13px 12px;
    margin-top: 10px;
    font-family: "Arial Black", Arial, sans-serif;
    font-weight: 900;
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .clear-all-btn:active { background: rgba(255,77,77,0.12); }
  .clear-all-btn:disabled {
    color: var(--gray-text);
    border-color: var(--gray-border);
    cursor: not-allowed;
  }

  @media (min-width: 480px) {
    .car-row {
      grid-template-columns: 1fr auto auto;
      grid-template-areas: "code qty actions";
      row-gap: 0;
    }
    .car-meta { display: none; }
    .car-meta.mobile-only { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1 class="wordmark">Garage <span>Log</span></h1>
  <p class="tagline">Hot Wheels Collection Scanner</p>
</header>

<main>
  <section class="scan-section">
    <span class="scan-label">Scan a toy number</span>
    <div class="scan-input-wrap">
      <input
        type="text"
        id="code-input"
        autofocus
        placeholder="Tap to Scan Code..."
        enterkeyhint="done"
        autocomplete="one-time-code"
        autocapitalize="characters"
        inputmode="text"
        name="code-scanner"
        spellcheck="false"
      >
    </div>
    <div id="confirmation-actions">
      <button id="confirm-add-btn" class="confirm-btn" type="button">Confirm &amp; Add</button>
      <button id="clear-input-btn" class="clear-btn" type="button">Clear</button>
    </div>
    <p class="scan-hint">Tap the field, then use your keyboard's <strong>Scan Text</strong> camera icon to capture a car's toy number. Review the code, then confirm to add it.</p>
    <p class="toast" id="toast" role="status" aria-live="polite"></p>
  </section>

  <div class="flag-divider" aria-hidden="true"></div>

  <section class="collection-list-section">
    <div class="collection-section-head">
      <h2 class="collection-title">Collection</h2>
      <span class="collection-count" id="collection-count">0 cars</span>
    </div>

    <div id="empty-state" class="empty-state">
      No cars scanned yet.<br>Start scanning to build your garage.
    </div>

    <div id="car-list" class="car-list"></div>

    <div class="export-wrap">
      <button id="export-btn" class="export-btn" disabled>Export Collection to CSV</button>
      <button id="clear-all-btn" class="clear-all-btn" disabled>Delete All Scanned Cars</button>
    </div>
  </section>
</main>

<script src="./app.js"></script>
</body>
</html>
